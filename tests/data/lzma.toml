            </p>
            <p>
              For a more convenient way of compressing a single chunk of data, see
              <a href="#lzma.compress">
                <code>
                  compress()
                </code>
              </a>
              .
            </p>
            <p>
              The
              format
              argument specifies what container format should be used. Possible values are:
            </p>
            <ul>
              <li>
                <dl>
                  <dt>
                    <code>
                      FORMAT_XZ
                    </code>
                    : The
                    <code>
                      .xz
                    </code>
                    container format.
                  </dt>
                  <dd>
                    <p>
                      This is the default format.
                    </p>
                  </dd>
                </dl>
              </li>
              <li>
                <dl>
                  <dt>
                    <code>
                      FORMAT_ALONE
                    </code>
                    : The legacy
                    <code>
                      .lzma
                    </code>
                    container format.
                  </dt>
                  <dd>
                    <p>
                      This format is more limited than
                      <code>
                        .xz
                      </code>
                      – it does not support integrity checks or multiple filters.
                    </p>
                  </dd>
                </dl>
              </li>
              <li>
                <dl>
                  <dt>
                    <code>
                      FORMAT_RAW
                    </code>
                    : A raw data stream, not using any container format.
                  </dt>
                  <dd>
                    <p>
                      This format specifier does not support integrity checks, and requires that you always specify a custom filter chain (for both compression and decompression). Additionally, data compressed in this manner cannot be decompressed using
                      <code>
                        FORMAT_AUTO
                      </code>
                      (see
                      <a href="#lzma.LZMADecompressor">
                        <code>
                          LZMADecompressor
                        </code>
                      </a>
                      ).
                    </p>
                  </dd>
                </dl>
              </li>
            </ul>
            <p>
              The
              check
              argument specifies the type of integrity check to include in the compressed data. This check is used when decompressing, to ensure that the data has not been corrupted. Possible values are:
            </p>
            <ul>
              <li>
                <p>
                  <code>
                    CHECK_NONE
                  </code>
                  : No integrity check. This is the default (and the only acceptable value) for
                  <code>
                    FORMAT_ALONE
                  </code>
                  and
                  <code>
                    FORMAT_RAW
                  </code>
                  .
                </p>
              </li>
              <li>
                <p>
                  <code>
                    CHECK_CRC32
                  </code>
                  : 32-bit Cyclic Redundancy Check.
                </p>
              </li>
              <li>
                <p>
                  <code>
                    CHECK_CRC64
                  </code>
                  : 64-bit Cyclic Redundancy Check. This is the default for
                  <code>
                    FORMAT_XZ
                  </code>
                  .
                </p>
              </li>
              <li>
                <p>
                  <code>
                    CHECK_SHA256
                  </code>
                  : 256-bit Secure Hash Algorithm.
                </p>
              </li>
            </ul>
            <p>
              If the specified check is not supported, an
              <a href="#lzma.LZMAError">
                <code>
                  LZMAError
                </code>
              </a>
              is raised.
            </p>
            <p>
              The compression settings can be specified either as a preset compression level (with the
              preset
              argument), or in detail as a custom filter chain (with the
              filters
              argument).
            </p>
            <p>
              The
              preset
              argument (if provided) should be an integer between
              <code>
                0
              </code>
              and
              <code>
                9
              </code>
              (inclusive), optionally OR-ed with the constant
              <code>
                PRESET_EXTREME
              </code>
              . If neither
              preset
              nor
              filters
              are given, the default behavior is to use
              <code>
                PRESET_DEFAULT
              </code>
              (preset level
              <code>
                6
              </code>
              ). Higher presets produce smaller output, but make the compression process slower.
            </p>
            <div>
              <p>
                Note
              </p>
              <p>
                In addition to being more CPU-intensive, compression with higher presets also requires much more memory (and produces output that needs more memory to decompress). With preset
                <code>
                  9
                </code>
                for example, the overhead for an
                <code>
                  LZMACompressor
                </code>
                object can be as high as 800 MiB. For this reason, it is generally best to stick with the default preset.
              </p>
            </div>
            <p>
              The
              filters
              argument (if provided) should be a filter chain specifier. See
              <a href="#filter-chain-specs">
                Specifying custom filter chains
              </a>
              for details.
            </p>
            <dl>
              <dt id="lzma.LZMACompressor.compress">
                compress
                (
                data
                )
              </dt>
              <dd>
                <p>
                  Compress
                  data
                  (a
                  <code>
                    bytes
                  </code>
                  object), returning a
                  <code>
                    bytes
                  </code>
                  object containing compressed data for at least part of the input. Some of
                  data
                  may be buffered internally, for use in later calls to
                  <code>
                    compress()
                  </code>
                  and
                  <a href="#lzma.LZMACompressor.flush">
                    <code>
                      flush()
                    </code>
                  </a>
                  . The returned data should be concatenated with the output of any previous calls to
                  <code>
                    compress()
                  </code>
                  .
                </p>
              </dd>
            </dl>
            <dl>
              <dt id="lzma.LZMACompressor.flush">
                flush
                (
                )
              </dt>
              <dd>
                <p>
                  Finish the compression process, returning a
                  <code>
                    bytes
                  </code>
                  object containing any data stored in the compressor’s internal buffers.
                </p>
                <p>
                  The compressor cannot be used after this method has been called.
                </p>
              </dd>
            </dl>
          </dd>
