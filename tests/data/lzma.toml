            <p>
              The
              format
              argument specifies the container format that should be used. The default is
              <code>
                FORMAT_AUTO
              </code>
              , which can decompress both
              <code>
                .xz
              </code>
              and
              <code>
                .lzma
              </code>
              files. Other possible values are
              <code>
