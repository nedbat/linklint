                  data
                  may be buffered internally, for use in later calls to
                  <code>
                    decompress()
                  </code>
                  . The returned data should be concatenated with the output of any previous calls to
                  <code>
                    decompress()
                  </code>
                  .
                </p>
                <p>
                  If
                  max_length
                  is nonnegative, returns at most
                  max_length
                  bytes of decompressed data. If this limit is reached and further output can be produced, the
                  <a href="#lzma.LZMADecompressor.needs_input">
