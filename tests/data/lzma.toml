                FORMAT_ALONE
              </code>
              , and
              <code>
                FORMAT_RAW
              </code>
              .
            </p>
            <p>
              The
              memlimit
              argument specifies a limit (in bytes) on the amount of memory that the decompressor can use. When this argument is used, decompression will fail with an
              <a href="#lzma.LZMAError">
